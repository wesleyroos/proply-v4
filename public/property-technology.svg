<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Property Technology Illustration -->
  <!-- Building with analytics overlay -->
  <g transform="translate(100, 50)">
    <!-- Building silhouette -->
    <rect x="100" y="100" width="400" height="400" rx="10" fill="#f5f5f5" stroke="#1BA3FF" stroke-width="3"/>
    
    <!-- Windows -->
    <g fill="#e0f7ff">
      <rect x="130" y="140" width="60" height="60" rx="5"/>
      <rect x="210" y="140" width="60" height="60" rx="5"/>
      <rect x="290" y="140" width="60" height="60" rx="5"/>
      <rect x="370" y="140" width="60" height="60" rx="5"/>
      
      <rect x="130" y="220" width="60" height="60" rx="5"/>
      <rect x="210" y="220" width="60" height="60" rx="5"/>
      <rect x="290" y="220" width="60" height="60" rx="5"/>
      <rect x="370" y="220" width="60" height="60" rx="5"/>
      
      <rect x="130" y="300" width="60" height="60" rx="5"/>
      <rect x="210" y="300" width="60" height="60" rx="5"/>
      <rect x="290" y="300" width="60" height="60" rx="5"/>
      <rect x="370" y="300" width="60" height="60" rx="5"/>
      
      <rect x="130" y="380" width="60" height="60" rx="5"/>
      <rect x="210" y="380" width="60" height="60" rx="5"/>
      <rect x="290" y="380" width="60" height="60" rx="5"/>
      <rect x="370" y="380" width="60" height="60" rx="5"/>
    </g>
    
    <!-- Data visualization elements -->
    <!-- Charts and graphs overlay -->
    <g stroke="#1BA3FF" stroke-width="2" fill="none">
      <!-- Line chart -->
      <polyline points="550,400 580,380 610,390 640,350 670,370" />
      <polyline points="550,350 580,330 610,360 640,320 670,300" stroke="#ff5733"/>
      
      <!-- Bar chart -->
      <rect x="550" y="270" width="20" height="30" stroke="none" fill="#1BA3FF" fill-opacity="0.5"/>
      <rect x="580" y="250" width="20" height="50" stroke="none" fill="#1BA3FF" fill-opacity="0.5"/>
      <rect x="610" y="230" width="20" height="70" stroke="none" fill="#1BA3FF" fill-opacity="0.5"/>
      <rect x="640" y="260" width="20" height="40" stroke="none" fill="#1BA3FF" fill-opacity="0.5"/>
      
      <!-- Circular indicators -->
      <circle cx="560" y="180" r="15" fill="#1BA3FF" fill-opacity="0.2"/>
      <circle cx="600" y="180" r="15" fill="#1BA3FF" fill-opacity="0.2"/>
      <circle cx="640" y="180" r="15" fill="#1BA3FF" fill-opacity="0.2"/>
      
      <!-- Connection lines -->
      <path d="M300,50 L560,180" stroke-dasharray="5,5" stroke-opacity="0.5"/>
      <path d="M300,50 L600,180" stroke-dasharray="5,5" stroke-opacity="0.5"/>
      <path d="M300,50 L640,180" stroke-dasharray="5,5" stroke-opacity="0.5"/>
      
      <!-- AI node -->
      <circle cx="300" y="50" r="30" fill="#1BA3FF" fill-opacity="0.3"/>
      <circle cx="300" y="50" r="20" fill="#1BA3FF" fill-opacity="0.5"/>
      <circle cx="300" y="50" r="10" fill="#1BA3FF"/>
    </g>
  </g>
  
  <!-- Abstract data elements -->
  <g fill="#1BA3FF" fill-opacity="0.1">
    <circle cx="50" y="100" r="40"/>
    <circle cx="650" y="150" r="60"/>
    <circle cx="700" y="450" r="80"/>
    <circle cx="150" y="500" r="50"/>
  </g>
</svg>